<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRE — Personal Reasoning Engine</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h1 class="logo">PRE</h1>
      <span class="logo-sub">Personal Reasoning Engine</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Sessions</div>
      <div id="session-list" class="session-list"></div>
      <div class="sidebar-actions">
        <button id="new-session-btn" class="btn btn-ghost btn-sm">+ Session</button>
        <button id="new-project-btn" class="btn btn-ghost btn-sm">+ Project</button>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="theme-switcher">
        <button class="theme-btn" data-theme="dark" title="Dark">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/></svg>
        </button>
        <button class="theme-btn" data-theme="light" title="Light">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/></svg>
        </button>
        <button class="theme-btn" data-theme="evangelion" title="Evangelion">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0L10 6H16L11 9.5L13 16L8 12L3 16L5 9.5L0 6H6L8 0Z"/></svg>
        </button>
      </div>
      <div id="status-bar" class="status-bar">
        <span class="status-dot"></span>
        <span id="status-text">Connecting...</span>
      </div>
    </div>
  </aside>

  <!-- Main chat area -->
  <main id="main" class="main">
    <header class="topbar">
      <button id="sidebar-toggle" class="btn btn-icon" title="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><rect y="3" width="20" height="2" rx="1"/><rect y="9" width="20" height="2" rx="1"/><rect y="15" width="20" height="2" rx="1"/></svg>
      </button>
      <div class="topbar-title">
        <span id="session-name">general</span>
      </div>
      <div class="context-wrapper" title="Context window usage">
        <span class="context-title">Context</span>
        <div id="context-bar" class="context-bar">
          <div id="context-fill" class="context-fill" style="width: 0%"></div>
        </div>
        <span id="context-label" class="context-label">0% of 64K</span>
      </div>
    </header>

    <div id="messages" class="messages">
      <div class="welcome">
        <div class="welcome-logo">PRE</div>
        <p class="welcome-text">Personal Reasoning Engine</p>
        <p class="welcome-sub">Local AI assistant running on Apple Silicon. All data stays on this machine.</p>
      </div>
    </div>

    <div class="input-area">
      <form id="chat-form" class="chat-form">
        <div class="input-wrapper">
          <textarea id="chat-input" class="chat-input" placeholder="Message PRE..." rows="1" autofocus></textarea>
          <button type="submit" id="send-btn" class="btn btn-primary btn-send" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span id="typing-indicator" class="typing-indicator hidden"></span>
          <span class="input-hint">Shift+Enter for newline</span>
        </div>
      </form>
    </div>
  </main>

  <!-- Right panel (artifacts, settings — Phase 3) -->
  <aside id="right-panel" class="right-panel hidden">
    <div class="panel-header">
      <span id="panel-title">Artifact</span>
      <button id="panel-close" class="btn btn-icon">&times;</button>
    </div>
    <div id="panel-content" class="panel-content"></div>
  </aside>

  <script src="js/markdown.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
