<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRE — Personal Reasoning Engine</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h1 class="logo">PRE</h1>
      <span class="logo-sub">Personal Reasoning Engine</span>
    </div>
    <div class="sidebar-toolbar">
      <div class="sidebar-search">
        <svg class="sidebar-search-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>
        <input type="text" id="session-search" placeholder="Search sessions..." autocomplete="off">
      </div>
      <div class="sidebar-actions">
        <button id="new-session-btn" class="btn btn-ghost btn-sm">+ Session</button>
        <button id="new-project-btn" class="btn btn-ghost btn-sm">+ Project</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div id="session-list" class="session-list"></div>
    </div>
    <div class="sidebar-footer">
      <div class="footer-row">
        <div class="theme-switcher"></div>
        <button id="memory-btn" class="btn btn-icon" title="Memory">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 0h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2zm0 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H4zm1 2h6v1H5V3zm0 3h6v1H5V6zm0 3h4v1H5V9z"/></svg>
        </button>
        <button id="cron-btn" class="btn btn-icon" title="Scheduled Jobs">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3.5a.5.5 0 0 0-1 0V8a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 7.71V3.5z"/><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/></svg>
        </button>
        <button id="settings-btn" class="btn btn-icon" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
      <div id="status-bar" class="status-bar">
        <span class="status-dot"></span>
        <span id="status-text">Connecting...</span>
      </div>
    </div>
  </aside>

  <!-- Main chat area -->
  <main id="main" class="main">
    <header class="topbar">
      <button id="sidebar-toggle" class="btn btn-icon" title="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><rect y="3" width="20" height="2" rx="1"/><rect y="9" width="20" height="2" rx="1"/><rect y="15" width="20" height="2" rx="1"/></svg>
      </button>
      <div class="topbar-title">
        <span id="session-name">general</span>
      </div>
      <div class="context-wrapper" title="Context window usage">
        <span class="context-title">Context</span>
        <div id="context-bar" class="context-bar">
          <div id="context-fill" class="context-fill" style="width: 0%"></div>
        </div>
        <span id="context-label" class="context-label">0% of 64K</span>
      </div>
    </header>

    <div id="messages" class="messages">
      <div class="welcome">
        <div class="welcome-logo">PRE</div>
        <p class="welcome-text">Personal Reasoning Engine</p>
        <p class="welcome-sub">Local AI assistant running on Apple Silicon. All data stays on this machine.</p>
      </div>
    </div>

    <div class="input-area">
      <form id="chat-form" class="chat-form">
        <div id="attachment-preview" class="attachment-preview hidden"></div>
        <div class="input-wrapper">
          <button type="button" id="attach-btn" class="btn btn-icon btn-attach" title="Attach file or image">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <div id="delegate-selector" class="delegate-selector">
            <button type="button" id="delegate-btn" class="btn btn-icon btn-delegate" title="Send to frontier AI">
              <span class="delegate-label">PRE</span>
            </button>
            <div id="delegate-dropdown" class="delegate-dropdown hidden">
              <button class="delegate-option active" data-target="local">
                <span class="delegate-dot" style="background:var(--primary)"></span>
                <span>PRE <small>(local)</small></span>
              </button>
              <button class="delegate-option" data-target="claude">
                <span class="delegate-dot" style="background:#cc785c"></span>
                <span>Claude</span>
                <span class="delegate-status" data-delegate="claude"></span>
              </button>
              <button class="delegate-option" data-target="codex">
                <span class="delegate-dot" style="background:#10a37f"></span>
                <span>Codex</span>
                <span class="delegate-status" data-delegate="codex"></span>
              </button>
              <button class="delegate-option" data-target="gemini">
                <span class="delegate-dot" style="background:#4285f4"></span>
                <span>Gemini</span>
                <span class="delegate-status" data-delegate="gemini"></span>
              </button>
            </div>
          </div>
          <div id="research-selector" class="research-selector">
            <button type="button" id="research-btn" class="btn btn-icon btn-research" title="Toggle Deep Research mode">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 1a.5.5 0 0 0 0 1h1v2.379L4.03 8.607A2.5 2.5 0 0 0 3.5 10.1V13.5A1.5 1.5 0 0 0 5 15h6a1.5 1.5 0 0 0 1.5-1.5V10.1a2.5 2.5 0 0 0-.53-1.493L9.5 4.379V2h1a.5.5 0 0 0 0-1h-5zM8.5 4.586L10.94 8H5.06L7.5 4.586V2h1v2.586zM4.5 10.1c0-.212.052-.42.15-.607L5.06 9h5.88l.41.493c.098.187.15.395.15.607V13.5a.5.5 0 0 1-.5.5H5a.5.5 0 0 1-.5-.5V10.1z"/></svg>
            </button>
            <div id="research-dropdown" class="research-dropdown hidden">
              <div class="research-dropdown-header">Deep Research</div>
              <label class="research-option">
                <input type="radio" name="research-synth" value="local" checked>
                <span class="research-option-text">
                  <strong>Multi-pass local</strong>
                  <small>Draft, critique, revise — all on-device</small>
                </span>
              </label>
              <label class="research-option">
                <input type="radio" name="research-synth" value="claude">
                <span class="research-option-text">
                  <strong>Frontier: Claude</strong>
                  <small>Deep thinking synthesis via Claude</small>
                </span>
              </label>
              <label class="research-option">
                <input type="radio" name="research-synth" value="codex">
                <span class="research-option-text">
                  <strong>Frontier: Codex</strong>
                  <small>Synthesis via OpenAI Codex</small>
                </span>
              </label>
              <label class="research-option">
                <input type="radio" name="research-synth" value="gemini">
                <span class="research-option-text">
                  <strong>Frontier: Gemini</strong>
                  <small>Synthesis via Google Gemini</small>
                </span>
              </label>
            </div>
          </div>
          <textarea id="chat-input" class="chat-input" placeholder="Message PRE..." rows="1" autofocus></textarea>
          <button type="submit" id="send-btn" class="btn btn-primary btn-send" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
          <button type="button" id="stop-btn" class="btn btn-danger btn-send hidden" title="Stop generating">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
          <input type="file" id="file-input" multiple accept="image/*,.txt,.md,.csv,.json,.xml,.yaml,.yml,.toml,.py,.js,.ts,.jsx,.tsx,.html,.css,.scss,.c,.cpp,.h,.hpp,.java,.go,.rs,.rb,.php,.sh,.bash,.zsh,.sql,.r,.swift,.kt,.scala,.lua,.pl,.ex,.exs,.hs,.ml,.clj,.lisp,.log,.conf,.cfg,.ini,.env,.dockerfile,.makefile,.pdf" hidden>
        </div>
        <div class="input-footer">
          <span id="typing-indicator" class="typing-indicator hidden"></span>
          <span class="input-hint">Shift+Enter for newline</span>
        </div>
      </form>
    </div>
  </main>

  <!-- Right panel (artifacts, settings — Phase 3) -->
  <aside id="right-panel" class="right-panel hidden">
    <div class="panel-header">
      <span id="panel-title">Artifact</span>
      <button id="panel-close" class="btn btn-icon">&times;</button>
    </div>
    <div id="panel-content" class="panel-content"></div>
  </aside>

  <script src="js/markdown.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
